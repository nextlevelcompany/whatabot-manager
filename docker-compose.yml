version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nextlead_postgres
    restart: always
    environment:
      POSTGRES_DB: nextlead
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nextlead_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextlead"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextlead_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextlead_backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nextlead
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: nextlead_password
      SPRING_SQL_INIT_MODE: always
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_DISPLAY_NUMBER: ${WHATSAPP_DISPLAY_NUMBER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - nextlead_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nextlead_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextlead_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - nextlead_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nextlead_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nextlead.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nextlead_network

volumes:
  postgres_data:
    driver: local
  nextlead_uploads:
    driver: local

networks:
  nextlead_network:
    driver: bridge
