version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nextlead_postgres
    restart: always
    environment:
      POSTGRES_DB: nextlead
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nextlead_password
      TZ: America/Lima
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextlead"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextlead_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextlead_backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nextlead
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: nextlead_password
      SPRING_SQL_INIT_MODE: always
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_DISPLAY_NUMBER: ${WHATSAPP_DISPLAY_NUMBER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TZ: America/Lima
    ports:
      - "8081:8080"
    volumes:
      - nextlead_uploads:/app/uploads
      - nextlead_backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nextlead_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextlead_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - TZ=America/Lima
    depends_on:
      - backend
    networks:
      - nextlead_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nextlead_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nextlead.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nextlead_network

  prometheus:
    image: prom/prometheus:latest
    container_name: nextlead_prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - nextlead_network

  loki:
    image: grafana/loki:latest
    container_name: nextlead_loki
    restart: always
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - nextlead_network

  promtail:
    image: grafana/promtail:latest
    container_name: nextlead_promtail
    restart: always
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - nextlead_backend_logs:/logs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - nextlead_network

  grafana:
    image: grafana/grafana:latest
    container_name: nextlead_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "4000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    networks:
      - nextlead_network

volumes:
  postgres_data:
    driver: local
  nextlead_uploads:
    driver: local
  nextlead_backend_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  nextlead_network:
    driver: bridge
